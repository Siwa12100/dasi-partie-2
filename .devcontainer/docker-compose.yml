services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    volumes:
      - ..:/workspaces/patiment:cached
    working_dir: /workspaces/patiment
    command: sleep infinity
    environment:
      DB_HOST: dasi-mariadb
      DB_PORT: "3306"
      DB_NAME: INSTRUCTIF-DB
      DB_USER: root
      DB_PASSWORD: root
      GIT_CONFIG_NOSYSTEM: "false"
    ports:
      - "8080:8080"
    depends_on:
      dasi-mariadb:
        condition: service_healthy
    networks:
      - dasi-network

  dasi-mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: INSTRUCTIF-DB
      MARIADB_USER: dasi
      MARIADB_PASSWORD: dasi
    ports:
      - "4379:3306"
    volumes:
      - dasi-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dasi-network

volumes:
  dasi-mariadb-data:

networks:
  dasi-network:
