<!DOCTYPE html>
<html>
    <head>
        <title>Connexion élève</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" />
        <script src="lib/sweetalert.min.js"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <header>
            <p>INSTRUCT'IF</p>
        </header>

        <h1 class="form-title">Page de connexion</h1>
        
        <form id="form" class="login-form">
            <div class="label-input">
                <label for="inputMail">Email :</label>
                <input id="inputMail" type="email" />
            </div>
            
            <div class="label-input">
                <label for="inputPassword">Password :</label>
                <input id="inputPassword" type="password" />
            </div>

            <div class="label-input">
                <label for="inputRemember">Se souvenir de moi</label>
                <input id="inputRemember" type="checkbox" />
            </div>

            <div class="label-input">
                <button class="btn" type="submit">Se connecter</button>
            </div>
        </form>

        <script>
            function initPage() {
                document.getElementById('form').addEventListener('submit', function(event) {
                    event.preventDefault();
                    connexionIntervenant();
                });
            };
            
            async function connexionIntervenant() {
                const email = document.getElementById('inputMail').value;
                const password = document.getElementById('inputPassword').value;

                if (email === "" || password === "") return;

                const url = './api/intervenants/authentifier';
                const body = {
                    mail: email,
                    motDePasse: password
                };
                
                const jsonResponse = await postRequest(url, body, "Impossible de se connecter.");
                if (jsonResponse) {
                    window.location.href = "historiqueIntervenant.html";
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
