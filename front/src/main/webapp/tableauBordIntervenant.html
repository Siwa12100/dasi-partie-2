<!DOCTYPE html>
<html>
    <head>
        <title>Connexion élève</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" />
        <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
        <link href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" rel="stylesheet"/>
    </head>
    <body>
        <header>
            <div class="nav">
                <p>INSTRUCT'IF</p>
                <a href="demandeIntervention.html">Intervenir</a>
                <a href="historiqueEleve.html">Tableau de bord</a>
            </div>
            
            <p>Emma</p>
        </header>

        <div class="dual-container">
            <div id="osm-map"></div>

            <div class="details">
                <div class="stat-block">
                    <p>0,5 h</p>
                    <p>oui</p>
                </div>
                <div class="stat-block">
                    <p>0,5 h</p>
                    <p>oui</p>
                </div>
                <div class="point-detail-block">
                    <p>Nom : zzz</p>
                    <p>Adresse : 123 Rue de la Paix</p>
                    <p>Académie : Paris</p>
                    <p>Privée : Non</p>
                    <p>IPS : 42</p>
                </div>
            </div>
        </div>

        <script>
            function initPage() {
                // Where you want to render the map.
                var element = document.getElementById('osm-map');

                // Create Leaflet map on map element.
                var map = L.map(element);

                // Add OSM tile layer to the Leaflet map.
                L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(map);

                // Target's GPS coordinates.
                var target = L.latLng('47.50737', '19.04611');

                // Set map's center to target with zoom 14.
                map.setView(target, 14);

                // Place a marker on the same location.
                L.marker(target).addTo(map);
            };
            
            async function listerDemandes() {
                console.log("Appel de l'Action: Consulter liste demandes");
                let url = './ActionServlet?todo=consulter-liste-demandes';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    console.log('Affichage de la liste de demandes');
                    const listeContainer = document.getElementById("liste-demandes");
                    
                    let html = "";
                    for (demande of jsonResponse["demandes"]) {
                        html += `
                            <li>#` + demande["id"] + ` : ` + demande["description"] + ` faite le ` + demande["dateCreation"] + `</li>
                        `;
            
                        //const elmtLi = document.createElement("li");
                        //const elmtTxt = document.createTextNode(demande["description"]);
                        //elmtLi.appendChild(elmtTxt);
                        //listeContainer.appendChild(elmtLi);
                    }
                    
                    listeContainer.innerHTML = html;
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
