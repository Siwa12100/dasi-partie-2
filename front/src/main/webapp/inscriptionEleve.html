<!DOCTYPE html>
<html>
    <head>
        <title>Inscription élève</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" />
        <script src="lib/sweetalert.min.js"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <header>
            <p>INSTRUCT'IF</p>
        </header>

        <h1 class="form-title">Formulaire d'inscription</h1>
        
        <form id="form" class="login-form">
            <div class="label-input">
                <label for="inputNom">Nom :</label>
                <input id="inputNom" type="text" />
            </div>
            
            <div class="label-input">
                <label for="inputPrenom">Prénom :</label>
                <input id="inputPrenom" type="text" />
            </div>

            <div class="label-input">
                <label for="inputDateNaissance">Date de naissance :</label>
                <input id="inputDateNaissance" type="date" />
            </div>

            <div class="label-input">
                <label for="inputCodeEtab">Code d'établissement :</label>
                <input id="inputCodeEtab" type="text" />
            </div>

            <div class="label-input">
                <label for="selectClasse">Classe :</label>
                <select id="selectClasse">
                    <option value="6">6e</option>
                    <option value="5">5e</option>
                    <option value="4">4e</option>
                    <option value="3">3e</option>
                </select>
            </div>

            <div class="label-input">
                <label for="inputMail">Email :</label>
                <input id="inputMail" type="email" />
            </div>
            
            <div class="label-input">
                <label for="inputPassword">Password :</label>
                <input id="inputPassword" type="password" />
            </div>

            <div class="label-input">
                <button class="btn" type="submit">Valider l'inscription</button>
            </div>
        </form>

        <script>
            function initPage() {
                document.getElementById('form').addEventListener('submit', function(event) {
                    event.preventDefault();
                    inscriptionEleve();
                });
            };
            
            async function inscriptionEleve() {
                const nom = document.getElementById('inputNom').value;
                const prenom = document.getElementById('inputPrenom').value;
                const dateNaissance = document.getElementById('inputDateNaissance').value;
                const codeEtab = document.getElementById('inputCodeEtab').value;
                const classe = document.getElementById('selectClasse').value;
                const mail = document.getElementById('inputMail').value;
                const password = document.getElementById('inputPassword').value;
                

                if (nom === "" || prenom === "" || dateNaissance === "" || classe === "" || codeEtab === "" || mail === "" || password === "") return;

                const url = './api/eleves/inscrire';
                const body = {
                    nom: nom,
                    prenom: prenom,
                    dateNaissance: dateNaissance,
                    codeEtablissement: codeEtab,
                    classe: classe,
                    mail: mail,
                    motDePasse: password
                };
                
                const jsonResponse = await postRequest(url, body, "Impossible de vous inscrire.");
                if (jsonResponse) {
                    swal("Inscription réussie !", "Vous pouvez maintenant vous connecter avec votre compte.", "success")
                    .then(() => {
                        window.location.href = "connexionEleve.html";
                    });
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
