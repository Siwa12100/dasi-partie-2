<!DOCTYPE html>
<html>
    <head>
        <title>Connexion élève</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" />
        <script src="lib/sweetalert.min.js"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <header>
            <div class="nav">
                <p>INSTRUCT'IF</p>
                <a href="demandeEleve.html">Faire demande</a>
                <a href="historiqueEleve.html">Historique</a>
            </div>
            
            <p id="prenom-compte">MISSINGNO</p>
        </header>


        <h1 class="form-title">Historique</h1>
        
        <div class="dual-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Thème</th>
                        <th>Intervenant</th>
                        <th>Voir plus</th>
                    </tr>
                </thead>
                <tbody id="liste-sceances">
                </tbody>
            </table>

            <div class="details" id="details">
                <p>Cliquez sur la 🔎 d'une séance pour voir les détails.</p>
            </div>
        </div>
        

        <script>
            function initPage() {
                recupererPrenomCompte();
                listerHistoriqueEleve();
            };
            
            async function listerHistoriqueEleve() {
                const url = './api/seances/historiqueEleve';
                
                const jsonResponse = await getRequest(url, "Impossible de charger l'historique des séances.");
                
                if (jsonResponse) {
                    const tbodyContainer = document.getElementById("liste-sceances");
                    
                    let html = "";
                    for (sceance of jsonResponse["sceances"]) {
                        html += `
                            <tr>
                                <td>` + sceance["id"] + `</td>
                                <td>` + sceance["dateHeure"] + `</td>
                                <td>` + sceance["theme"] + `</td>
                                <td>` + sceance["intervenant"] + `</td>
                                <td><button onclick="voirDetails(` + sceance["id"] + `)">🔎</button></td>
                            </tr>
                        `;
                    }
                    
                    tbodyContainer.innerHTML = html;
                }
            }

            async function voirDetails(idSceance) {
                const url = './api/seances/recuperer?id=' + idSceance;
                
                const jsonResponse = await getRequest(url, "Impossible de charger les détails de la séance.");
                
                if (jsonResponse) {
                    const detailsContainer = document.getElementById("details");
                    
                    let html = `
                        <p>Description :</p>
                        <p>` + jsonResponse["messageDemande"] + `</p>
                        <p>Bilan :</p>
                        <p>` + jsonResponse["compteRendu"] + `</p>
                    `;
                    
                    detailsContainer.innerHTML = html;
                }
            }

            async function recupererPrenomCompte() {
                const sessionStorage = window.sessionStorage;
                const prenom = sessionStorage.getItem("prenom");

                if (prenom) {
                    const prenomContainer = document.getElementById("prenom-compte");
                    prenomContainer.innerText = prenom;
                }
            }

            window.onload = initPage;
        </script>
    </body>
</html>
