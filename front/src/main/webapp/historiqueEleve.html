<!DOCTYPE html>
<html>
    <head>
        <title>Connexion élève</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" />
        <script src="lib/sweetalert.min.js"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <header>
            <div class="nav">
                <p>INSTRUCT'IF</p>
                <a href="demandeIntervention.html">Faire demande</a>
                <a href="historiqueEleve.html">Historique</a>
            </div>
            
            <p>Matis</p>
        </header>


        <h1 class="form-title">Historique</h1>
        
        <div class="dual-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Thème</th>
                        <th>Intervenant</th>
                        <th>Voir plus</th>
                    </tr>
                </thead>
                <tbody id="liste-sceances">
                    <tr>
                        <td>1</td>
                        <td>2024-06-01</td>
                        <td>Java</td>
                        <td>Jean Dupont</td>
                        <td><a href="#">Voir plus</a></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>2024-06-15</td>
                        <td>Python</td>
                        <td>Marie Curie</td>
                        <td><a href="#">Voir plus</a></td>
                    </tr>
                </tbody>
            </table>

            <div class="details" id="details">
                <p>Description :</p>
                <p>oui</p>
                <p>Bilan :</p>
                <p>oui</p>
            </div>
        </div>
        

        <script>
            function initPage() {
                listerHistoriqueEleve();
            };
            
            async function listerHistoriqueEleve() {
                const url = './api/sceances/historiqueEleve';
                
                const jsonResponse = await getRequest(url, "Impossible de se connecter.");
                
                if (jsonResponse) {
                    const tbodyContainer = document.getElementById("liste-sceances");
                    
                    let html = "";
                    for (sceance of jsonResponse["sceances"]) {
                        html += `
                            <tr>
                                <td>` + sceance["id"] + `</td>
                                <td>` + sceance["date"] + `</td>
                                <td>` + sceance["theme"] + `</td>
                                <td>` + sceance["intervenant"] + `</td>
                                <td><button onclick="voirDetails(` + sceance["id"] + `)">Voir plus</button></td>
                            </tr>
                        `;
                    }
                    
                    tbodyContainer.innerHTML = html;
                }
            }

            async function voirDetails(idSceance) {
                const url = './api/sceances/' + idSceance;
                
                const jsonResponse = await getRequest(url, "Impossible de se connecter.");
                
                if (jsonResponse) {
                    const detailsContainer = document.getElementById("details");
                    
                    let html = `
                        <p>Description :</p>
                        <p>` + jsonResponse["description"] + `</p>
                        <p>Bilan :</p>
                        <p>` + jsonResponse["bilan"] + `</p>
                    `;
                    
                    detailsContainer.innerHTML = html;
                }
            }

            window.onload = initPage;
        </script>
    </body>
</html>
