<!DOCTYPE html>
<html>
    <head>
        <title>Connexion élève</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" />
        <script src="sweetalert.min.js"></script>
    </head>
    <body>
        <header>
            <p>INSTRUCT'IF</p>
        </header>


        <h1 class="form-title">Page de connexion</h1>
        
        <form id="form" class="login-form">
            <div class="label-input">
                <label for="inputMail">Email :</label>
                <input id="inputMail" type="email" />
            </div>
            
            <div class="label-input">
                <label for="inputPassword">Password :</label>
                <input id="inputPassword" type="password" />
            </div>

            <div class="label-input">
                <label for="inputRemember">Se souvenir de moi</label>
                <input id="inputRemember" type="checkbox" />
            </div>

            <div class="label-input">
                <button class="btn" type="submit">Se connecter</button>
                <a class="btn" href="creationCompteEleve.html">Créer un compte élève</a>
            </div>
        </form>

        <script>
            function initPage() {
                console.log("Initialisation de la page");
                document.getElementById('form').addEventListener('submit', function(event) {
                    event.preventDefault();
                    console.log("Click sur le bouton 'Se connecter'");
                    connexionEleve();
                });
            };
            
            async function connexionEleve() {
                console.log("Appel de l'Action: Connexion élève");

                let email = document.getElementById('inputMail').value;
                let password = document.getElementById('inputPassword').value;

                let url = './eleves?todo=authentifier';
                let jsonResponse = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        mail: email,
                        password: password
                    })
                }).then(
                    function(httpResponse) {
                        let jsonResponse = null;

                        try {
                            jsonResponse = httpResponse.json();
                        } catch {}

                        if (!httpResponse.ok || jsonResponse?.success == false) {
                            throw new Error("HTTP error " + httpResponse.status + ": " + (jsonResponse?.message ?? "Erreur inconnue"));
                        }
                        return jsonResponse;
                    }
                ).catch(
                    function(error) {
                        swal("Oups !", "Impossible de se connecter. " + error, "error");
                        return null;
                    }
                );
                
                if (jsonResponse) {
                    window.location.href = "historiqueEleve.html";
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
